<div class="p-6">
  <div class="mb-6">
    <h1 class="text-[22px] font-semibold tracking-tight text-gray-900">Configurações</h1>
    <p class="mt-1 text-[14px] text-gray-500">Gerencie as configurações do seu workspace.</p>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <i class="pi pi-spin pi-spinner text-[24px] text-indigo-500"></i>
    </div>
  } @else {
    <div class="max-w-lg rounded-lg border border-gray-200 bg-white p-6">
      <h2 class="text-[16px] font-medium text-gray-900 mb-4">Workspace</h2>

      @if (successMessage()) {
        <div class="mb-4 flex items-center gap-2 rounded-lg border border-green-200 bg-green-50 px-3.5 py-3 text-[13px] text-green-700">
          <i class="pi pi-check-circle"></i>
          <span>{{ successMessage() }}</span>
        </div>
      }

      @if (errorMessage()) {
        <div class="mb-4 flex items-start gap-2.5 rounded-lg border border-red-200 bg-red-50 px-3.5 py-3 text-[13px] text-red-700">
          <i class="pi pi-exclamation-circle mt-0.5 text-red-400" style="font-size: 14px"></i>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label for="workspace-name" class="mb-1.5 block text-[13px] font-medium text-gray-700">Nome do workspace</label>
          <input pInputText id="workspace-name" formControlName="name" class="w-full" />
          @if (form.controls.name.touched && form.controls.name.hasError('required')) {
            <small class="mt-1 block text-[12px] text-red-500">Nome é obrigatório</small>
          }
        </div>

        <p-button type="submit" label="Salvar" [loading]="saving()" [disabled]="form.invalid || saving()" />
      </form>
    </div>
  }
</div>
