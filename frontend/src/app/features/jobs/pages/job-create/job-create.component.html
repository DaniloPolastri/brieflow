<div class="mx-auto max-w-[1280px] px-8 py-8">
  <!-- Header -->
  <div class="mb-6">
    <div class="mb-1 flex items-center gap-1 text-[12px] text-gray-500">
      <a routerLink="/jobs" class="hover:text-indigo-600">Jobs</a>
      <span>/</span>
      <span class="text-gray-600">Novo Job</span>
    </div>
    <h2 class="text-[24px] font-semibold tracking-tight text-gray-900">
      Novo Job
    </h2>
    <p class="mt-1 text-[14px] text-gray-500">
      Crie um novo job com briefing estruturado.
    </p>
  </div>

  <!-- Grid: form + sidebar -->
  <div class="grid grid-cols-1 gap-8 lg:grid-cols-[1fr_320px]">
    <main>
      <app-job-form
        mode="create"
        [initialJob]="null"
        (submitted)="onFormSubmit($event)"
        (filesStaged)="onFilesStaged($event)"
      />
    </main>

    @if (formGroup(); as fg) {
      <app-job-summary-sidebar
        [form]="fg"
        mode="create"
        [loading]="loading()"
        (save)="onSave()"
        (cancel)="onCancel()"
      />
    }
  </div>

  <p-toast position="bottom-right" />
</div>
