<div class="flex h-full w-[280px] shrink-0 flex-col rounded-lg p-2" [class]="bgColor()">
  <!-- Header -->
  <div class="mb-3 flex items-center gap-2 px-1">
    <span class="h-2 w-2 rounded-full" [class]="dotColor()"></span>
    <span data-testid="column-label" class="text-[13px] font-semibold" [class]="textColor()">
      {{ label() }}
    </span>
    <span
      data-testid="column-count"
      class="ml-auto flex h-5 w-5 items-center justify-center rounded-full bg-white/70 text-[11px] font-medium text-gray-600"
    >{{ jobs().length }}</span>
  </div>

  <!-- Drop zone -->
  <div
    cdkDropList
    [cdkDropListData]="jobs()"
    [id]="status()"
    (cdkDropListDropped)="onDrop($event)"
    class="flex min-h-[60px] flex-1 flex-col gap-2 overflow-y-auto"
  >
    @for (job of jobs(); track job.id) {
      <div cdkDrag [cdkDragData]="job" [cdkDragDisabled]="!canDragFn()(job)">
        <app-kanban-card
          [job]="job"
          [disabled]="!canDragFn()(job)"
          (cardClicked)="onCardClick($event)"
        />
      </div>
    }

    @if (jobs().length === 0) {
      <div
        data-testid="empty-state"
        class="flex flex-1 items-center justify-center rounded-lg border-2 border-dashed border-gray-200 py-8 text-[12px] text-gray-400"
      >
        Arraste jobs aqui
      </div>
    }
  </div>
</div>
