<div cdkDropListGroup class="flex gap-4 overflow-x-auto pb-4">
  @for (col of columns; track col.status) {
    <app-kanban-column
      [status]="col.status"
      [label]="col.label"
      [bgColor]="col.bgColor"
      [textColor]="col.textColor"
      [dotColor]="col.dotColor"
      [jobs]="columnJobs()[col.status]"
      [canDragFn]="canDragFn()"
      (jobDropped)="onColumnDrop($event)"
      (jobClicked)="onCardClick($event)"
    />
  }
</div>

<p-confirmDialog />
<p-toast />
